<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<audio autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->

<section id="page1" class="active">

<h1>Wait a moment...</h1>

<div id="countdown">10</div>

</section>

<!-- PAGE 2 MESSAGE CARDS -->

<section id="page2">

<h1>A little message for you</h1>

<div class="card" id="card1">
Today is not just another day...
</div>

<div class="card" id="card2">
It's the birthday of someone very special...
</div>

<div class="card" id="card3">
And that someone is YOU ❤️
</div>

<button onclick="nextPage(3)">Next</button>

</section>

<!-- PAGE 3 PHOTO SLIDER -->

<section id="page3">

<h1>Some beautiful memories with you ❤️</h1>

<div class="photo-container">

<img id="memoryPhoto" src="photo1.jpg">

</div>

<button onclick="nextPage(4)">Continue</button>

</section>

<!-- PAGE 4 BALLOONS -->

<section id="page4">

<h1>Pop the balloons 🎈</h1>

<img class="balloon"
src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
onclick="pop(this,'You are Kind')">

<img class="balloon"
src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
onclick="pop(this,'You are Amazing')">

<img class="balloon"
src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
onclick="pop(this,'You are Strong')">

<img class="balloon"
src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
onclick="pop(this,'You are Very Special ❤️')">

<p id="balloonMsg"></p>

<button onclick="nextPage(5)">Next</button>

</section>

<!-- PAGE 5 CAKE -->

<section id="page5">

<h1>Make a Wish 🎂</h1>

<img class="cake"
src="https://cdn-icons-png.flaticon.com/512/3468/3468374.png"
onclick="celebrate()">

</section>

<!-- PAGE 6 ENVELOPE -->

<section id="page6">

<h1>Open Your Letter 💌</h1>

<img class="envelope"
src="https://cdn-icons-png.flaticon.com/512/561/561127.png"
onclick="openLetter()">

<div id="letter"></div>

</section>

<script src="script.js"></script>

</body>
</html>
