<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<section id="page1" class="active">

<h1>Something Special is Coming...</h1>

<div id="countdown">10</div>

</section>



<section id="page2">

<h1>Click the Cards 💌</h1>

<div class="card-container">

<div class="flip-card" onclick="flipCard(this)">
<div class="flip-inner">
<div class="flip-front">Click Me</div>
<div class="flip-back">Today is not just another day...</div>
</div>
</div>

<div class="flip-card" onclick="flipCard(this)">
<div class="flip-inner">
<div class="flip-front">Click Me</div>
<div class="flip-back">It's the birthday of someone amazing...</div>
</div>
</div>

<div class="flip-card" onclick="flipCard(this)">
<div class="flip-inner">
<div class="flip-front">Click Me</div>
<div class="flip-back">And that someone is YOU ❤️</div>
</div>
</div>

</div>

<button onclick="nextPage(3)">Next</button>

</section>



<section id="page3">

<h1>Beautiful Memories ❤️</h1>

<div class="photo-container">

<img id="memoryPhoto" src="pic1.jpg">

</div>

<button onclick="nextPage(4)">Next</button>

</section>



<section id="page4">

<h1>Pop the Balloons 🎈</h1>

<div class="balloon-container">

<img class="balloon"
src="https://cdn-icons-png.flaticon.com/512/744/744546.png"
onclick="popBalloon(this,'You are Kind')">

<img class="balloon"
src="https://cdn-icons-png.flaticon.com/512/744/744546.png"
onclick="popBalloon(this,'You are Amazing')">

<img class="balloon"
src="https://cdn-icons-png.flaticon.com/512/744/744546.png"
onclick="popBalloon(this,'You are Strong')">

<img class="balloon"
src="https://cdn-icons-png.flaticon.com/512/744/744546.png"
onclick="popBalloon(this,'You are Very Special ❤️')">

</div>

<p id="balloonMsg"></p>

<button onclick="nextPage(5)">Next</button>

</section>



<section id="page5">

<h1>Make a Wish 🎂</h1>

<img class="cake"
src="https://cdn-icons-png.flaticon.com/512/3468/3468374.png"
onclick="celebrate()">

</section>



<section id="page6">

<h1>Open Your Letter 💌</h1>

<img class="envelope"
src="https://cdn-icons-png.flaticon.com/512/561/561127.png"
onclick="openGreeting()">

<div id="greetingCard" class="greeting-card">

<h2>Happy Birthday 🎉</h2>

<p id="greetingText"></p>

<img id="finalPhoto" src="final.jpg" class="final-photo">

</div>

</section>


<script src="script.js"></script>

</body>
</html>
